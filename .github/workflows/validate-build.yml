name: Validate Build

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore: [ '**.md' ]
  pull_request:
    branches:
      - main
      - 'feature/**'
    paths-ignore: [ '**.md' ]

permissions:
  contents: read

env:
  solution: Microsoft.DurableTask.sln
  config: release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup .NET 6.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: '6.0.x'

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: '8.0.x'

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: '10.0.x'

    - name: Setup .NET from global.json
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore $env:solution

    - name: Build
      run: dotnet build $env:solution --configuration $env:config --no-restore -p:FileVersionRevision=$env:GITHUB_RUN_NUMBER

    - name: Test
      run: dotnet test $env:solution --configuration $env:config --no-build --verbosity normal

    - name: Pack
      run: dotnet pack $env:solution --configuration $env:config --no-build

    - name: Upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pkg
        path: out/pkg
