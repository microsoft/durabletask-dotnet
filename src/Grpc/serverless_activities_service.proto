syntax = "proto3";

package microsoft.durabletask.serverless;

option csharp_namespace = "Microsoft.DurableTask.Protobuf.Serverless";

service ServerlessActivities {
  // Opens a live remote activity worker session. The first message must be a
  // start message with static worker metadata. Heartbeats carry dynamic state
  // only. Closing the stream deregisters the worker.
  rpc ConnectRemoteActivityWorker(stream RemoteActivityWorkerMessage) returns (RemoteActivityWorkerSessionResult);

  // Declares remote activities before any live worker stream exists. This is a
  // configuration contract and does not advertise active worker capacity.
  rpc DeclareRemoteActivities(RemoteActivityDeclaration) returns (RemoteActivityDeclarationResult);
}

message RemoteActivityWorkerMessage {
  oneof message {
    RemoteActivityWorkerStart start = 1;
    RemoteActivityWorkerHeartbeat heartbeat = 2;
  }
}

message RemoteActivityWorkerStart {
  string task_hub = 1;
  string worker_instance_id = 2;
  int32 max_activities_count = 3;
  // Substrate the worker is running in. UNSPECIFIED = legacy (pre-substrate-aware) workers.
  SubstrateKind substrate = 4;
  // Identifier of the ADC sandbox the worker is running inside. Empty when substrate != SANDBOX.
  string sandbox_id = 5;
  string worker_profile_id = 6;
}

message RemoteActivityWorkerHeartbeat {
  int32 active_activities_count = 1;
}

message RemoteActivityWorkerSessionResult {
  bool accepted = 1;
  string message = 2;
}

message RemoteActivityDeclaration {
  string task_hub = 1;
  string worker_profile_id = 2;
  repeated string activity_names = 3;
  RemoteActivityImage image = 4;
  map<string, string> environment_variables = 5;
  int32 max_concurrent_activities = 6;
}

message RemoteActivityImage {
  string image_ref = 1;
  bool public_pull = 2;
}

message RemoteActivityDeclarationResult {
}

// Compute substrate executing the activity worker.
enum SubstrateKind {
  SUBSTRATE_KIND_UNSPECIFIED = 0;
  SUBSTRATE_KIND_ACA_SESSION_POOL = 1;
  SUBSTRATE_KIND_SANDBOX = 2;
}
