name: Azure Functions Smoke Tests

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths-ignore: [ '**.md' ]
  pull_request:
    paths-ignore: [ '**.md' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

    - name: Setup .NET
      uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
      with:
        dotnet-version: '8.0.x'

    - name: Setup .NET from global.json
      uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
      with:
        global-json-file: global.json

    - name: Restore dependencies
      run: dotnet restore test/AzureFunctionsSmokeTests/AzureFunctionsSmokeTests.csproj

    - name: Run smoke tests
      run: |
        cd test/AzureFunctionsSmokeTests
        pwsh -File run-smoketests.ps1
      
    - name: Upload smoke test logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: smoke-test-logs
        path: test/AzureFunctionsSmokeTests/logs/
        if-no-files-found: ignore
